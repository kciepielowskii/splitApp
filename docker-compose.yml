version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: splitapp-postgres
    environment:
      POSTGRES_DB: splitapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: splitapp
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/splitapp
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_SECURITY_JWT_SECRET: splitapp-super-secret-key-minimum-256-bits-long-for-hs256
      SPRING_SECURITY_JWT_EXPIRATION: 86400000
    depends_on:
      - postgres

volumes:
  postgres_data: